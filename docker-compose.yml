services:
  rtafnc-portal:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    container_name: rtafnc-portal
    restart: unless-stopped
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
