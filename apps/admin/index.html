<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#173b5e">
  <meta name="robots" content="noindex,nofollow">
  <title>RTAFNC Staff Console</title>
  <link rel="stylesheet" href="./styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./config.js"></script>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand"><div class="mark">วพอ.</div><div><strong>RTAFNC Staff</strong><small>Private Console</small></div></div>
      <nav>
        <button class="active" data-page="overview">ภาพรวม</button>
        <button data-page="good">ตรวจความดี</button>
        <button data-page="medical">เจ้าหน้าที่แพทย์</button>
        <button data-page="news">ข่าวสาร</button>
        <button data-page="students">ทะเบียนนักเรียน</button>
        <button data-page="system">สถานะระบบ</button>
      </nav>
      <button id="resetDemo" class="secondary">รีเซ็ตข้อมูลสาธิต</button>
    </aside>

    <main>
      <header class="topbar">
        <div><small>RTAFNC CONTROL CENTER</small><h1 id="pageTitle">ภาพรวมระบบ</h1></div>
        <div class="actions"><span id="modeBadge" class="badge warning">DEMO MODE</span><button id="connectionButton" class="secondary">ตรวจการเชื่อมต่อ</button></div>
      </header>
      <section id="content" class="content"></section>
    </main>
  </div>

  <div id="modal" class="modal" aria-hidden="true">
    <section class="modal-card">
      <header><div><h2 id="modalTitle">รายละเอียด</h2><p id="modalSubtitle"></p></div><button id="modalClose" class="icon-button">×</button></header>
      <div id="modalBody"></div>
    </section>
  </div>

  <div id="toast" class="toast"></div>
  <script type="module" src="./app.js"></script>
</body>
</html>
