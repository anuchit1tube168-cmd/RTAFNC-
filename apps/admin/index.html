<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#173b5e">
  <meta name="robots" content="noindex,nofollow">
  <meta name="description" content="หน้าสาธิตสำหรับเจ้าหน้าที่ RTAFNC ใช้ตรวจความดี งานแพทย์ ข่าวสาร ทะเบียนนักเรียน และ Audit Log">
  <title>RTAFNC Staff Console</title>
  <link rel="stylesheet" href="./styles.css?v=20260620-3">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./config.js?v=20260620-3"></script>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">
        <div class="mark">วพอ.</div>
        <div><strong>RTAFNC Staff</strong><small>DEMO CONTROL CENTER</small></div>
      </div>

      <div class="role-box">
        <label for="roleSelect">บทบาทจำลอง</label>
        <select id="roleSelect">
          <option value="reviewer">ผู้ตรวจความดี</option>
          <option value="medical">เจ้าหน้าที่แพทย์</option>
          <option value="registrar">นายทะเบียน</option>
          <option value="admin">ผู้ดูแลระบบ</option>
        </select>
      </div>

      <nav aria-label="เมนูเจ้าหน้าที่">
        <button class="active" data-page="overview" type="button">ภาพรวม</button>
        <button data-page="good" type="button">ตรวจความดี</button>
        <button data-page="medical" type="button">เจ้าหน้าที่แพทย์</button>
        <button data-page="news" type="button">ข่าวสาร</button>
        <button data-page="students" type="button">ทะเบียนนักเรียน</button>
        <button data-page="audit" type="button">Audit Log</button>
        <button data-page="system" type="button">สถานะระบบ</button>
      </nav>

      <div class="sidebar-actions">
        <button id="openStudentDemo" class="secondary" type="button">เปิด Student LIFF</button>
        <button id="resetDemo" class="secondary danger-soft" type="button">คืนค่าข้อมูลสาธิต</button>
      </div>
    </aside>

    <main>
      <header class="topbar">
        <div><small>RTAFNC CONTROL CENTER</small><h1 id="pageTitle">ภาพรวมระบบ</h1></div>
        <div class="actions"><span id="modeBadge" class="badge warning">DEMO MODE</span><button id="connectionButton" class="secondary" type="button">ตรวจการเชื่อมต่อ</button></div>
      </header>
      <section id="content" class="content"></section>
    </main>
  </div>

  <div id="modal" class="modal" aria-hidden="true" role="dialog" aria-modal="true">
    <section class="modal-card">
      <header><div><h2 id="modalTitle">รายละเอียด</h2><p id="modalSubtitle"></p></div><button id="modalClose" class="icon-button" type="button" aria-label="ปิด">×</button></header>
      <div id="modalBody"></div>
    </section>
  </div>

  <div id="toast" class="toast" aria-live="polite"></div>
  <script type="module" src="./app.js?v=20260620-3"></script>
  <script src="./interaction-hotfix.js?v=20260620-3"></script>
</body>
</html>
