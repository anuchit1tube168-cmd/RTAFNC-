<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#075f4b">
  <meta name="robots" content="noindex,nofollow">
  <meta name="description" content="ระบบนักเรียนพยาบาลทหารอากาศสำหรับบันทึกความดี ข้อมูลโรงพยาบาล และข่าวสารผ่าน LINE LIFF">
  <title>RTAFNC Student Portal</title>
  <link rel="stylesheet" href="./styles.css?v=20260620-2">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="./config.js?v=20260620-2"></script>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">วพอ.</div>
        <div>
          <strong>RTAFNC Student Portal</strong>
          <small>LINE OA · LIFF · Supabase</small>
        </div>
      </div>
      <button id="connectionButton" class="chip" type="button">สถานะระบบ</button>
    </header>

    <section class="member-card" aria-label="ข้อมูลสมาชิก">
      <div class="member-row">
        <div id="avatar" class="avatar">67</div>
        <div class="member-copy">
          <span>ยินดีต้อนรับ</span>
          <h1 id="memberName">นพอ.ตัวอย่าง ระบบทดสอบ</h1>
          <p id="memberMeta">6700000 · รุ่น 67 · ชั้นปี 2</p>
        </div>
        <span id="memberStatus" class="member-status">DEMO</span>
      </div>
      <div class="metrics">
        <article><small>ชั่วโมงความดี</small><strong id="goodHours">0</strong></article>
        <article><small>รออนุมัติ</small><strong id="pendingCount">0</strong></article>
        <article><small>ไปโรงพยาบาล</small><strong id="hospitalCount">0</strong></article>
        <article><small>ข่าวใหม่</small><strong id="newsCount">3</strong></article>
      </div>
    </section>

    <main id="main" class="page-content"></main>

    <nav class="bottom-nav" aria-label="เมนูหลัก">
      <button class="active" data-page="home" type="button"><span>⌂</span>หน้าหลัก</button>
      <button data-page="good" type="button"><span>☆</span>ความดี</button>
      <button data-page="hospital" type="button"><span>✚</span>โรงพยาบาล</button>
      <button data-page="news" type="button"><span>♧</span>ข่าวสาร</button>
      <button data-page="profile" type="button"><span>◎</span>บัญชี</button>
    </nav>
  </div>

  <div id="modal" class="modal" role="dialog" aria-modal="true" aria-hidden="true">
    <section class="modal-card">
      <div class="modal-handle"></div>
      <header class="modal-header">
        <div>
          <h2 id="modalTitle">รายละเอียด</h2>
          <p id="modalSubtitle"></p>
        </div>
        <button id="modalClose" class="icon-button" type="button" aria-label="ปิด">×</button>
      </header>
      <div id="modalBody"></div>
    </section>
  </div>

  <div id="toast" class="toast" aria-live="polite"></div>
  <script type="module" src="./app-runtime.js?v=20260620-2"></script>
  <script src="./interaction-hotfix.js?v=20260620-2"></script>
</body>
</html>
