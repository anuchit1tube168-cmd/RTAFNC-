<style>
:root{--g:#0bbf86;--g2:#29e2a5;--dark:#063d2d;--bg:#eef9f3;--card:#fff;--line:#dcece4;--muted:#71857c;--txt:#102e26;--blue:#38bdf8;--pink:#f9a8d4;--yellow:#ffc928;--shadow:0 18px 55px #06433124}*{box-sizing:border-box}body{margin:0;font-family:Kanit,Sarabun,sans-serif;color:var(--txt);background:linear-gradient(135deg,#ecfff6,#fafffd,#e9f5ec)}button,input,select,textarea{font-family:inherit}button{cursor:pointer;border:0}.hide{display:none!important}.login{min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at 20% 20%,#27e8a650,transparent 32%),#064331;color:#fff;padding:22px}.loginbox{width:min(980px,100%);display:grid;grid-template-columns:1fr 1fr;background:#ffffff14;border:1px solid #ffffff25;border-radius:28px;overflow:hidden;box-shadow:0 40px 100px #0008;backdrop-filter:blur(16px)}.brand,.logform{padding:46px}.brand{background:#ffffff10}.ico{width:58px;height:58px;border-radius:18px;background:linear-gradient(135deg,var(--g),var(--g2));display:grid;place-items:center;font-size:28px;box-shadow:0 14px 30px #0bbf8640}.brand h1{font-size:27px;line-height:1.25;margin:22px 0 10px}.brand h1 span{display:block;color:#bfffea;font-size:32px}.brand p,.logform p{color:#cbe2da;line-height:1.7}.feat{display:grid;gap:12px;margin-top:25px}.feat div{display:flex;gap:14px;align-items:center;background:#ffffff12;border:1px solid #ffffff18;border-radius:16px;padding:13px}.feat i{font-style:normal;background:#16d39735;width:35px;height:35px;border-radius:12px;display:grid;place-items:center}.logform{display:grid;align-content:center;border-left:1px solid #ffffff1c}.logform h2{margin:0;font-size:28px}.field{margin:13px 0}.field label{display:block;color:#dcefe9;margin-bottom:7px}.field input{width:100%;border:1px solid #ffffff24;background:#ffffff13;color:#fff;border-radius:15px;padding:14px}.field input::placeholder{color:#aac5bb}.loginbtn{width:100%;padding:15px;border-radius:15px;background:linear-gradient(135deg,var(--g),var(--g2));color:#063729;font-weight:800;font-size:16px;margin-top:10px}.demo{border:1px dashed #ffffff35;border-radius:18px;padding:14px;margin-top:20px}.demogrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.demogrid button{border:1px solid #ffffff1e;border-radius:14px;background:#ffffff13;color:#fff;padding:12px 5px}.app{min-height:100vh;display:grid;grid-template-columns:255px 1fr}.side{height:100vh;position:sticky;top:0;background:linear-gradient(180deg,#064331,#043323);color:#eafff6;padding:14px;overflow:auto}.logo{display:flex;gap:12px;align-items:center;padding-bottom:16px}.logo .ico{width:43px;height:43px;font-size:21px;border-radius:14px}.time,.user{background:#ffffff10;border:1px solid #ffffff18;border-radius:17px;padding:14px;margin-bottom:12px}.time{text-align:center}.clock{font-size:25px;font-weight:800}.date{color:#b8d4ca;font-size:12px}.user{display:flex;gap:10px;align-items:center}.av{width:38px;height:38px;border-radius:13px;background:linear-gradient(135deg,var(--g),var(--g2));display:grid;place-items:center;color:#063729;font-weight:800}.role{background:#ffd34e;color:#432e00;border-radius:99px;padding:2px 8px;font-size:11px;font-weight:800}.sec{color:#75e3bf;font-size:12px;margin:20px 0 8px}.nav{display:flex;align-items:center;gap:11px;width:100%;text-align:left;background:transparent;color:#ddf2ea;border-radius:14px;padding:12px;margin:3px 0}.nav.on,.nav:hover{background:#14d59925;box-shadow:inset 3px 0 0 var(--g)}.nav.out{background:#ef44441c;color:#ffd8d8;margin-top:14px}.top{height:72px;background:#ffffffcc;backdrop-filter:blur(10px);border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;padding:0 22px;position:sticky;top:0;z-index:3}.pt{display:flex;gap:13px;align-items:center}.pt i{font-style:normal;width:42px;height:42px;border-radius:14px;background:#d9fff1;display:grid;place-items:center}.pt h2{margin:0}.pt small{color:var(--muted)}.online,.chip{background:#fff;border:1px solid var(--line);border-radius:99px;padding:8px 12px}.online:before{content:"";display:inline-block;width:8px;height:8px;background:var(--g);border-radius:50%;margin-right:7px}.main{min-width:0}.content{padding:26px}.hero{border-radius:23px;padding:30px;background:linear-gradient(135deg,#086246,#21d99b);color:#fff;box-shadow:var(--shadow);position:relative;overflow:hidden}.hero:after{content:"";position:absolute;right:-100px;top:-150px;width:420px;height:420px;border-radius:50%;background:radial-gradient(circle,#ffffff55,transparent 62%)}.hero b{background:#ffffff24;border-radius:99px;padding:7px 12px;font-size:13px}.hero h1{margin:14px 0 4px;font-size:30px}.hero p{margin:0;color:#e6fff6}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin:18px 0}.stat,.panel,.card,.vendor{background:#fff;border:1px solid var(--line);border-radius:19px;padding:18px;box-shadow:0 10px 30px #06433114}.stat small{color:var(--muted)}.stat strong{display:block;font-size:27px;color:#087a59}.toolbar{display:grid;grid-template-columns:1fr auto auto auto;gap:10px;margin:18px 0}.inp,select,textarea{width:100%;border:1px solid var(--line);border-radius:15px;background:#fff;padding:13px;outline:0}.btn{border:1px solid var(--line);border-radius:14px;background:#fff;padding:12px 16px;font-weight:800;color:#0d3b2e}.btn.primary{background:linear-gradient(135deg,#0fbf89,#23d99e);border-color:transparent;color:#fff}.btn.warn{background:#fff2c6}.btn.danger{background:#fff0f0;color:#a82424}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:5px 0 18px}.tab{background:transparent;border-radius:99px;padding:8px 12px;color:#335f52;font-weight:700}.tab.on{background:#fff;color:#087a59;box-shadow:0 8px 20px #0001}.cards{display:grid;grid-template-columns:repeat(3,minmax(240px,1fr));gap:16px}.card{position:relative;overflow:hidden}.card:before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--g)}.card.hire:before{background:var(--blue)}.card h3{margin:8px 0}.head{display:flex;justify-content:space-between;color:var(--muted);font-size:13px}.type,.status{border-radius:99px;padding:4px 9px;font-size:12px;font-weight:800;display:inline-flex}.type{background:#eafff6;color:#087a59}.hire .type{background:#e1f6ff;color:#0275a8}.amount{font-size:23px;font-weight:800;color:#087a59;margin:16px 0}.meta{color:#73867e;font-size:12px;display:flex;gap:9px;flex-wrap:wrap}.bottom{border-top:1px dashed var(--line);padding-top:12px;display:flex;justify-content:space-between}.complete{background:#d7fff0;color:#087a59}.director,.order,.inspected{background:#dff7ff;color:#087198}.review{background:#ebf2ff;color:#4565b0}.draft{background:#edf1f4;color:#65717b}.consider{background:#ffe3f1;color:#b32170}.table{overflow:auto;border:1px solid var(--line);border-radius:18px;background:#fff}table{border-collapse:collapse;width:100%;min-width:760px}th,td{padding:13px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}th{background:#f4faf7;color:#315f51}.grid2{display:grid;grid-template-columns:1fr 360px;gap:16px}.docs{display:grid;grid-template-columns:1fr 1fr;gap:10px}.doc{background:#fff;border:1px solid var(--line);border-radius:16px;padding:13px;text-align:left}.formgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.full{grid-column:1/-1}.items .row{display:grid;grid-template-columns:1fr 80px 120px 38px;gap:8px;margin-bottom:8px}.vendors{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.muted{color:var(--muted)}.toast{position:fixed;right:20px;bottom:20px;background:#043d2d;color:#fff;border-radius:16px;padding:13px 16px;box-shadow:var(--shadow);z-index:99}.mob{display:none}@media(max-width:1100px){.cards{grid-template-columns:repeat(2,1fr)}.grid2{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}.vendors{grid-template-columns:repeat(2,1fr)}}@media(max-width:760px){.loginbox{grid-template-columns:1fr}.brand,.logform{padding:28px}.demogrid{grid-template-columns:repeat(2,1fr)}.app{grid-template-columns:1fr}.side{position:fixed;left:-280px;width:255px;z-index:10;transition:.2s}.side.open{left:0}.mob{display:inline-flex}.content{padding:16px}.toolbar{grid-template-columns:1fr 1fr}.toolbar input{grid-column:1/-1}.cards,.vendors{grid-template-columns:1fr}.stats{grid-template-columns:1fr}.formgrid{grid-template-columns:1fr}.items .row{grid-template-columns:1fr 65px 85px 36px}.chip{display:none}}</style>
</head><body><div id="root"></div><div id="toast" class="toast hide"></div>
<script>
const roles={admin:['นายผู้ดูแล ระบบ','ผู้ดูแลระบบ','🛡️'],director:['ผู้อำนวยการ','ผู้บริหาร','🎓'],head:['หัวหน้าเจ้าหน้าที่','หัวหน้า','🧾'],officer:['เจ้าหน้าที่พัสดุ','เจ้าหน้าที่','🛒']};
const labels={draft:'ฉบับร่าง',review:'เสนอตรวจสอบ',director:'ผอ.เห็นชอบรายงาน',consider:'เสนอผลพิจารณา',order:'อนุมัติสั่งซื้อ/จ้าง',inspected:'ตรวจรับแล้ว',complete:'เสร็จสมบูรณ์',cancel:'ยกเลิก'},next={draft:'review',review:'director',director:'consider',consider:'order',order:'inspected',inspected:'complete'};
const seed=[['1234','2026-06-21','จ้างทำไวนิล','hire','งานทดสอบ',300,'complete','ร้านป้ายดีไซน์'],['พิเศษ/1/2569','2026-06-20','จัดซื้อวัสดุวิทยาศาสตร์','buy','กลุ่มสาระวิทยาศาสตร์',9300,'complete','บริษัท แลปซัพพลาย จำกัด'],['พิเศษ/2/2569','2026-06-18','จ้างทำความสะอาดอาคารเรียน','hire','งานอาคารสถานที่',45000,'director','หจก. สะอาดทันใจ'],['พิเศษ/3/2569','2026-06-16','จัดซื้อครุภัณฑ์คอมพิวเตอร์','buy','กลุ่มสาระเทคโนโลยี',98950,'order','บริษัท ไอทีโปร จำกัด'],['พิเศษ/4/2569','2026-06-14','จัดซื้อวัสดุสำนักงาน','buy','งานธุรการ',17260,'review','ร้านสมาร์ทออฟฟิศ'],['พิเศษ/5/2569','2026-06-12','จ้างซ่อมแซมเครื่องปรับอากาศ','hire','กลุ่มบริหารวิชาการ',10200,'draft','ช่างเย็นเซอร์วิส'],['พิเศษ/6/2569','2026-06-10','จัดซื้อวัสดุอุปกรณ์กีฬา','buy','กลุ่มสาระสุขศึกษาและพลศึกษา',13060,'consider','ร้านสปอร์ตเวิลด์']].map((x,i)=>({id:'r'+i,number:x[0],date:x[1],subject:x[2],type:x[3],group:x[4],amount:x[5],status:x[6],vendor:x[7],owner:'นางสาวมานี เจ้าหน้าที่',reason:'เพื่อใช้ในการปฏิบัติราชการและสนับสนุนภารกิจของหน่วยงาน',budget:'งบดำเนินงาน',days:7,items:[{name:x[2],qty:1,price:x[5]}]}));
let S=JSON.parse(localStorage.spsRTAFNC||'null')||{user:null,org:'วิทยาลัยพยาบาลทหารอากาศ',phone:'02-534-3626',director:'ผู้อำนวยการวิทยาลัยพยาบาลทหารอากาศ',officer:'เจ้าหน้าที่พัสดุ',req:seed,vendors:['บริษัท ไอทีโปร จำกัด','หจก. สะอาดทันใจ','ร้านสมาร์ทออฟฟิศ','บริษัท แลปซัพพลาย จำกัด','ช่างเย็นเซอร์วิส','ร้านสปอร์ตเวิลด์'],audit:['เริ่มต้นระบบตัวอย่าง']};
const $=q=>document.querySelector(q),fmt=n=>Number(n||0).toLocaleString('th-TH',{minimumFractionDigits:2}),td=d=>new Date(d+'T00:00:00+07:00').toLocaleDateString('th-TH-u-ca-buddhist',{day:'numeric',month:'short',year:'numeric'}),save=()=>localStorage.spsRTAFNC=JSON.stringify(S),go=p=>{location.hash=p;render()},toast=t=>{$('#toast').textContent=t;$('#toast').classList.remove('hide');setTimeout(()=>$('#toast').classList.add('hide'),1800)},audit=t=>{S.audit.unshift(new Date().toLocaleString('th-TH-u-ca-buddhist')+' · '+(S.user?.name||'guest')+' · '+t);save()};
function sum(){return {n:S.req.length,total:S.req.reduce((a,b)=>a+b.amount,0),done:S.req.filter(x=>x.status=='complete').length}}
function render(){if(!S.user)return login();let p=location.hash.slice(1)||'dashboard';root.innerHTML=shell(p);page(p);clock()}
function login(){root.innerHTML=`<section class="login"><div class="loginbox"><div class="brand"><div class="ico">🛒</div><h1>ระบบจัดซื้อจัดจ้าง วิธีเฉพาะเจาะจง<span>บริหารงานพัสดุครบทุกมิติ</span></h1><p>ถอดแบบเป็น Static Web App สำหรับ GitHub Pages ใช้ทดลอง Flow เอกสารราชการและพิมพ์ PDF</p><div class="feat"><div><i>🧾</i><span><b>จัดซื้อจัดจ้างครบวงจร</b><br><small>ขอซื้อ/ขอจ้าง อนุมัติ ตรวจรับ</small></span></div><div><i>🖨️</i><span><b>พิมพ์เอกสารราชการ</b><br><small>ตัวอย่างก่อนพิมพ์/บันทึก PDF</small></span></div><div><i>📱</i><span><b>ใช้งานได้ทุกอุปกรณ์</b><br><small>มือถือ แท็บเล็ต คอมพิวเตอร์</small></span></div></div></div><div class="logform"><h2>ยินดีต้อนรับกลับ</h2><p>เข้าสู่ระบบเพื่อจัดการงานจัดซื้อจัดจ้าง</p><div class="field"><label>ชื่อผู้ใช้</label><input id="u" value="admin" placeholder="username"></div><div class="field"><label>รหัสผ่าน</label><input id="p" type="password" value="123456"></div><button class="loginbtn" onclick="app.login()">↪ เข้าสู่ระบบ</button><div class="demo"><b>ทดลองใช้งาน</b><div class="demogrid">${Object.keys(roles).map(k=>`<button onclick="app.quick('${k}')"><div>${roles[k][2]}</div><b>${roles[k][1]}</b><br><small>${k}</small></button>`).join('')}</div><p style="text-align:center;color:#cbe2da;font-size:12px">รหัสผ่าน 123456</p></div></div></div></section>`}
function shell(p){return `<section class="app"><aside class="side" id="side"><div class="logo"><div class="ico">🛒</div><div><b>SPS วพอ.</b><br><small>${S.org}</small></div></div><div class="time"><div class="clock" id="clock">--:--:--</div><div class="date">วันอาทิตย์ที่ 21 มิถุนายน พ.ศ. 2569</div></div><div class="user"><div class="av">${S.user.key[0].toUpperCase()}</div><div><b>${S.user.name}</b><br><span class="role">${S.user.role}</span></div></div>${nav(p)}<button class="nav out" onclick="app.logout()">🚪 ออกจากระบบ</button></aside><main class="main"><header class="top"><div class="pt"><button class="btn mob" onclick="side.classList.toggle('open')">☰</button><i>${icon(p)}</i><div><h2>${name(p)}</h2><small>${desc(p)}</small></div></div><div><span class="online">ออนไลน์</span> <span class="chip">${S.user.name}</span></div></header><div class="content" id="page"></div></main></section>`}
function nav(p){let m=[['dashboard','📊','แดชบอร์ด','ภาพรวม'],['requests','📄','ใบขอซื้อ/ขอจ้าง','งานหลัก'],['create','➕','สร้างเอกสารใหม่','งานหลัก'],['vendors','🏬','ผู้ขาย/ผู้รับจ้าง','ข้อมูลหลัก'],['reports','📈','รายงานสรุป','รายงานและประวัติ'],['audit','🕘','ประวัติการใช้งาน','รายงานและประวัติ'],['settings','⚙️','ตั้งค่าระบบ','ระบบ']];let last='';return m.map(x=>`${last!=x[3]?`<div class="sec">• ${x[3]}</div>`:''}${last=x[3],`<button class="nav ${p.startsWith(x[0])?'on':''}" onclick="go('${x[0]}')">${x[1]} ${x[2]}</button>`}`).join('')}
function icon(p){return {dashboard:'📊',requests:'📄',create:'➕',vendors:'🏬',reports:'📈',audit:'🕘',settings:'⚙️'}[p.split('?')[0].split('/')[0]]||'📄'}function name(p){return p.startsWith('view')?'รายละเอียดเอกสาร':({dashboard:'แดชบอร์ด',requests:'ใบขอซื้อ/ขอจ้าง',create:'สร้างเอกสารใหม่',vendors:'ผู้ขาย/ผู้รับจ้าง',reports:'รายงานสรุป',audit:'ประวัติการใช้งาน',settings:'ตั้งค่าระบบ'}[p]||'แดชบอร์ด')}function desc(p){return p.startsWith('view')?'ข้อมูลและการดำเนินการเอกสาร':'จัดการเอกสารจัดซื้อจัดจ้าง วิธีเฉพาะเจาะจง'}
function hero(t,s){return `<div class="hero"><b>▧ งานจัดซื้อจัดจ้าง</b><h1>${t}</h1><p>${s}</p></div>`}function stats(){let s=sum();return `<div class="stats"><div class="stat"><small>จำนวนเอกสาร</small><strong>${s.n}</strong></div><div class="stat"><small>มูลค่ารวม</small><strong>${fmt(s.total)}</strong></div><div class="stat"><small>เสร็จสมบูรณ์</small><strong>${s.done}</strong></div><div class="stat"><small>กำลังดำเนินการ</small><strong>${s.n-s.done}</strong></div></div>`}
function page(p){let el=$('#page'); if(p.startsWith('view'))return view(p.split('=')[1]); ({dashboard:dash,requests:reqs,create:create,vendors:vendors,reports:reports,audit:aud,settings:settings}[p]||dash)(el)}
function dash(el){el.innerHTML=hero('ระบบจัดซื้อจัดจ้าง วิธีเฉพาะเจาะจง','ภาพรวมสถานะ วงเงิน และเอกสารที่ต้องดำเนินการ')+stats()+`<div class="panel"><h3>รายการล่าสุด</h3>${table(S.req.slice(0,6),1)}</div>`}
function reqs(el){el.innerHTML=hero('ใบขอซื้อ/ขอจ้าง','ค้นหา กรองสถานะ และเปิดรายละเอียดเอกสาร')+`<div class="toolbar"><input class="inp" id="q" oninput="filter()" placeholder="ค้นหาเลขที่ เรื่อง กลุ่มงาน"><select id="type" onchange="filter()"><option value="all">ทุกประเภท</option><option value="buy">จัดซื้อ</option><option value="hire">จัดจ้าง</option></select><button class="btn" onclick="app.v=app.v=='grid'?'table':'grid';filter()">▦/☰</button><button class="btn primary" onclick="go('create')">＋ สร้างเอกสาร</button></div><div class="tabs">${['all','draft','review','director','consider','order','inspected','complete'].map((k,i)=>`<button class="tab ${i?'':'on'}" onclick="app.st='${k}';document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));this.classList.add('on');filter()">${k=='all'?'ทั้งหมด':labels[k]}</button>`).join('')}</div><div id="list"></div>`;app.st='all';filter()}
function filter(){let q=($('#q')?.value||'').toLowerCase(),ty=$('#type')?.value||'all',st=app.st||'all';let l=S.req.filter(r=>(ty=='all'||r.type==ty)&&(st=='all'||r.status==st)&&JSON.stringify(r).toLowerCase().includes(q));$('#list').innerHTML=(app.v=='table')?table(l,1):`<div class="cards">${l.map(card).join('')}</div>`}
function card(r){return `<article class="card ${r.type=='hire'?'hire':''}" onclick="go('view?id=${r.id}')"><div class="head"><span>${r.number}</span><span class="type">${r.type=='hire'?'🔨 จัดจ้าง':'🛒 จัดซื้อ'}</span></div><h3>${r.subject}</h3><div class="meta"><span>▣ ${r.group}</span><span>♙ ${r.owner}</span></div><div class="amount">${fmt(r.amount)} บาท</div><div class="bottom"><span class="status ${r.status}">${labels[r.status]}</span><span class="muted">${td(r.date)}</span></div></article>`}
function table(l,click){return `<div class="table"><table><thead><tr><th>เลขที่</th><th>วันที่</th><th>เรื่อง</th><th>ประเภท</th><th>กลุ่มงาน</th><th>วงเงิน</th><th>สถานะ</th></tr></thead><tbody>${l.map(r=>`<tr ${click?`onclick="go('view?id=${r.id}')" style="cursor:pointer"`:''}><td>${r.number}</td><td>${td(r.date)}</td><td><b>${r.subject}</b><br><small>${r.vendor}</small></td><td>${r.type=='hire'?'จัดจ้าง':'จัดซื้อ'}</td><td>${r.group}</td><td><b>${fmt(r.amount)}</b></td><td><span class="status ${r.status}">${labels[r.status]}</span></td></tr>`).join('')}</tbody></table></div>`}
function view(id){let r=S.req.find(x=>x.id==id);$('#page').innerHTML=hero(r.subject,`${r.number} · ${td(r.date)} · ${r.vendor}`)+`<div class="grid2"><section class="panel"><h2>${r.subject}</h2><p class="muted">${r.reason}</p>${statsMini(r)}<h3>รายการพัสดุ</h3>${itemTable(r)}<p><button class="btn primary" onclick="app.next('${r.id}')">ดำเนินการขั้นถัดไป</button> <button class="btn warn" onclick="printDoc('บันทึกข้อความ','${r.id}')">พิมพ์บันทึกข้อความ</button> <button class="btn danger" onclick="app.del('${r.id}')">ลบ</button></p></section><aside class="panel"><h3>พิมพ์เอกสารราชการ</h3><div class="docs">${['รายงานขอซื้อ/จ้าง','รายละเอียดแนบ','แต่งตั้งกรรมการ','ใบเสนอราคา','รายงานผลพิจารณา','ประกาศผู้ชนะ','ใบสั่งซื้อ/จ้าง','ใบตรวจรับ','ขออนุมัติเบิกจ่าย'].map(x=>`<button class="doc" onclick="printDoc('${x}','${r.id}')">🖨️<br><b>${x}</b><br><small class="muted">ตัวอย่างก่อนพิมพ์</small></button>`).join('')}</div></aside></div>`}
function statsMini(r){return `<div class="stats"><div class="stat"><small>วงเงิน</small><strong>${fmt(r.amount)}</strong></div><div class="stat"><small>สถานะ</small><strong style="font-size:18px">${labels[r.status]}</strong></div><div class="stat"><small>วิธีจัดหา</small><strong style="font-size:18px">เฉพาะเจาะจง</strong></div><div class="stat"><small>กำหนดส่งมอบ</small><strong>${r.days} วัน</strong></div></div>`}
function itemTable(r){return `<div class="table"><table><thead><tr><th>#</th><th>รายการ</th><th>จำนวน</th><th>ราคา/หน่วย</th><th>รวม</th></tr></thead><tbody>${r.items.map((it,i)=>`<tr><td>${i+1}</td><td>${it.name}</td><td>${it.qty}</td><td>${fmt(it.price)}</td><td>${fmt(it.qty*it.price)}</td></tr>`).join('')}<tr><td colspan="4"><b>รวม</b></td><td><b>${fmt(r.amount)}</b></td></tr></tbody></table></div>`}
function create(el){el.innerHTML=hero('สร้างเอกสารใหม่','บันทึกคำขอและรายการพัสดุ')+`<form class="panel" onsubmit="app.saveReq(event)"><div class="formgrid"><div><label>เลขที่</label><input class="inp" name="number" value="พิเศษ/${S.req.length+1}/2569"></div><div><label>วันที่</label><input class="inp" type="date" name="date" value="2026-06-21"></div><div><label>ประเภท</label><select name="type"><option value="buy">จัดซื้อ</option><option value="hire">จัดจ้าง</option></select></div><div><label>กลุ่มงาน</label><input class="inp" name="group" required></div><div class="full"><label>เรื่อง</label><input class="inp" name="subject" required></div><div><label>ผู้ขาย/ผู้รับจ้าง</label><input class="inp" name="vendor" required></div><div><label>งบประมาณ</label><input class="inp" name="budget" value="งบดำเนินงาน"></div><div class="full"><label>เหตุผล</label><textarea name="reason" rows="3">เพื่อใช้ในการปฏิบัติราชการและสนับสนุนภารกิจของหน่วยงาน</textarea></div><div class="full items" id="items"><label>รายการพัสดุ</label><div class="row"><input class="inp" value="รายการพัสดุ"><input class="inp" type="number" value="1"><input class="inp" type="number" value="1000"><button type="button" class="btn danger" onclick="this.parentElement.remove()">×</button></div></div></div><p><button type="button" class="btn" onclick="app.addItem()">＋ เพิ่มรายการ</button> <button class="btn primary">บันทึกเอกสาร</button></p></form>`}
function vendors(el){el.innerHTML=hero('ผู้ขาย/ผู้รับจ้าง','ฐานข้อมูลคู่ค้า')+`<div class="vendors">${S.vendors.map(v=>`<div class="vendor"><h3>🏬 ${v}</h3><p class="muted">คู่ค้าสำหรับระบบจัดซื้อจัดจ้าง</p><p>โทร: -<br>เลขผู้เสียภาษี: -</p></div>`).join('')}</div>`}
function reports(el){el.innerHTML=hero('รายงานสรุปการจัดซื้อจัดจ้าง','พิมพ์รายงานหรือ Export CSV')+stats()+`<p><button class="btn warn" onclick="printSummary()">🖨️ พิมพ์ / บันทึก PDF</button> <button class="btn" onclick="csv()">⬇ Export CSV</button></p>`+table(S.req,0)}
function aud(el){el.innerHTML=hero('ประวัติการใช้งาน','Audit log')+`<div class="panel">${S.audit.map(x=>`<p>🕘 ${x}</p>`).join('')}</div>`}
function settings(el){el.innerHTML=hero('ตั้งค่าระบบ','ข้อมูลหน่วยงานสำหรับเอกสารราชการ')+`<form class="panel formgrid" onsubmit="app.set(event)"><div><label>หน่วยงาน</label><input class="inp" name="org" value="${S.org}"></div><div><label>โทรศัพท์</label><input class="inp" name="phone" value="${S.phone}"></div><div><label>ผู้บริหาร</label><input class="inp" name="director" value="${S.director}"></div><div><label>เจ้าหน้าที่พัสดุ</label><input class="inp" name="officer" value="${S.officer}"></div><div class="full"><button class="btn primary">บันทึก</button></div></form>`}
function paper(t,b){let w=open('','_blank','width=980,height=760');w.document.write(`<!doctype html><html lang="th"><head><meta charset="utf-8"><title>${t}</title><link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet"><style>body{margin:0;background:#edf2f1;font-family:Sarabun,sans-serif}.bar{background:#075533;color:#fff;padding:12px 18px;display:flex;justify-content:space-between}.bar button{border:0;border-radius:10px;padding:10px 14px;font-family:inherit;font-weight:700}.p{width:210mm;min-height:297mm;margin:22px auto;background:#fff;padding:22mm;box-shadow:0 20px 60px #0003;line-height:1.55}.c{text-align:center}.r{text-align:right}.gar{font-size:42px;filter:grayscale(1)}table{border-collapse:collapse;width:100%;margin:12px 0}th,td{border:1px solid #222;padding:7px}th{font-weight:700}.sig{margin-top:30px;text-align:center;margin-left:50%}@page{size:A4;margin:0}@media print{.bar{display:none}.p{margin:0;box-shadow:none}}</style></head><body><div class="bar"><b>🖨️ ตัวอย่างก่อนพิมพ์</b><div><button onclick="window.close()">ปิด</button><button onclick="print()" style="background:#ffc928">พิมพ์ / บันทึก PDF</button></div></div><main class="p">${b}</main></body></html>`);w.document.close()}
function printDoc(kind,id){let r=S.req.find(x=>x.id==id);paper(kind,`<div class="c gar">ตราครุฑ</div><h2 class="c">${kind}</h2><p><b>ส่วนราชการ</b> ${S.org} โทร. ${S.phone}</p><p><b>ที่</b> ${r.number} <span style="float:right"><b>วันที่</b> ${td(r.date)}</span></p><p><b>เรื่อง</b> ${r.subject}</p><p><b>เรียน</b> ${S.director}</p><p style="text-indent:2.5em">ด้วย ${r.group} มีความประสงค์${r.type=='hire'?'จ้าง':'ซื้อ'} ${r.subject} เพื่อ ${r.reason} โดยวิธีเฉพาะเจาะจง วงเงิน ${fmt(r.amount)} บาท</p>${itemTable(r)}<p><b>ผู้ขาย/ผู้รับจ้าง:</b> ${r.vendor}</p><div class="sig">ลงชื่อ................................<br>${S.officer}</div>`)}
function printSummary(){paper('รายงานสรุป',`<h2 class="c">รายงานสรุปการจัดซื้อจัดจ้าง วิธีเฉพาะเจาะจง</h2><p class="c">${S.org} · ปีงบประมาณ 2569</p>${table(S.req,0)}<div class="sig">ลงชื่อ................................<br>${S.officer}</div>`)}
function csv(){let rows=[['เลขที่','วันที่','เรื่อง','ประเภท','กลุ่มงาน','วงเงิน','สถานะ'],...S.req.map(r=>[r.number,td(r.date),r.subject,r.type=='hire'?'จัดจ้าง':'จัดซื้อ',r.group,r.amount,labels[r.status]])];let a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\ufeff'+rows.map(r=>r.map(x=>'"'+String(x).replaceAll('"','""')+'"').join(',')).join('\n')],{type:'text/csv'}));a.download='sps-report.csv';a.click()}
function clock(){let e=$('#clock');if(e){e.textContent=new Date().toLocaleTimeString('th-TH',{hour12:false});setTimeout(clock,1000)}}
window.app={st:'all',v:'grid',login(){let u=$('#u').value,p=$('#p').value;if(roles[u]&&p=='123456')this.quick(u);else toast('ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง')},quick(k){S.user={key:k,name:roles[k][0],role:roles[k][1]};audit('เข้าสู่ระบบ');go('dashboard')},logout(){S.user=null;save();render()},next(id){let r=S.req.find(x=>x.id==id);if(!next[r.status])return toast('สิ้นสุดขั้นตอนแล้ว');r.status=next[r.status];audit('ปรับสถานะ '+r.number+' เป็น '+labels[r.status]);save();render();toast('อัปเดตสถานะแล้ว')},del(id){if(confirm('ลบเอกสารนี้?')){S.req=S.req.filter(x=>x.id!=id);audit('ลบเอกสาร');save();go('requests')}},addItem(){items.insertAdjacentHTML('beforeend','<div class="row"><input class="inp" value="รายการพัสดุ"><input class="inp" type="number" value="1"><input class="inp" type="number" value="0"><button type="button" class="btn danger" onclick="this.parentElement.remove()">×</button></div>')},saveReq(e){e.preventDefault();let f=e.target,its=[...document.querySelectorAll('#items .row')].map(row=>{let x=row.querySelectorAll('input');return{name:x[0].value,qty:+x[1].value,price:+x[2].value}}),amt=its.reduce((a,b)=>a+b.qty*b.price,0),r={id:'n'+Date.now(),number:f.number.value,date:f.date.value,subject:f.subject.value,type:f.type.value,group:f.group.value,amount:amt,status:'draft',vendor:f.vendor.value,owner:S.officer,reason:f.reason.value,budget:f.budget.value,days:7,items:its};S.req.unshift(r);audit('สร้างเอกสาร '+r.number);save();go('view?id='+r.id);toast('บันทึกแล้ว')},set(e){e.preventDefault();S.org=e.target.org.value;S.phone=e.target.phone.value;S.director=e.target.director.value;S.officer=e.target.officer.value;audit('บันทึกตั้งค่าระบบ');save();toast('บันทึกแล้ว');render()}};
render();
</script></body></html>
