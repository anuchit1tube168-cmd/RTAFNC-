<!doctype html>
<html lang="th">
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RTAFNC Expense Tracker</title>
  <style>
    :root{font-family:Inter,'Noto Sans Thai',system-ui,sans-serif;color:#e5edf7;background:#071426}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at top left,#163b63,#071426 50%,#050b14)}button,input,select,textarea{font:inherit}button{border:0;cursor:pointer}.app{width:min(1400px,100%);margin:0 auto;padding:24px}.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:18px}.topbar h1{margin:4px 0 0;font-size:clamp(1.8rem,5vw,3.2rem)}.eyebrow{color:#82e6ff;font-weight:900}.profile{display:flex;gap:10px;align-items:center;flex-wrap:wrap;padding:10px;border-radius:18px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12)}.profile small{color:#82e6ff;font-weight:900;text-transform:uppercase}.nav{display:inline-flex;gap:8px;padding:8px;margin-bottom:16px;border-radius:18px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12)}.nav button{display:inline-flex;align-items:center;gap:8px;padding:10px 14px;border-radius:14px;background:transparent;color:#dcecff;font-weight:900}.nav button.active{background:#e0f2fe;color:#075985}.alert,.success{margin:14px 0;padding:12px 14px;border-radius:16px}.alert{background:rgba(255,99,99,.12);border:1px solid rgba(255,99,99,.35);color:#ffc9c9}.success{background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.35);color:#bbf7d0}.stat-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px;margin-bottom:16px}.stat{padding:18px;border-radius:24px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);min-height:120px;display:flex;flex-direction:column;justify-content:space-between}.stat span{color:#b7c8df}.stat strong{font-size:clamp(1.3rem,3vw,2rem)}.content{display:grid;grid-template-columns:380px 1fr;gap:16px}.panel{padding:20px;border-radius:28px;background:rgba(255,255,255,.95);color:#0f172a;box-shadow:0 18px 60px rgba(0,0,0,.22)}.panel h2,.panel h3{margin:0 0 8px}.muted{color:#64748b;margin:0 0 14px}label{display:block;margin:14px 0 6px;font-weight:900;color:#1e293b}input,select,textarea{width:100%;padding:12px 14px;border:1px solid #dbe3ef;border-radius:16px;background:#f8fafc;color:#0f172a;outline:none}input:focus,select:focus,textarea:focus{border-color:#38bdf8;box-shadow:0 0 0 4px rgba(56,189,248,.16)}.seg{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:6px;border-radius:18px;background:#eef6ff}.seg button{padding:10px;border-radius:14px;background:transparent;color:#475569;font-weight:900}.seg button.active{background:#0284c7;color:#fff}.primary,.secondary,.danger,.icon{display:inline-flex;align-items:center;justify-content:center;gap:8px;border-radius:16px;font-weight:900}.primary{width:100%;padding:14px 18px;color:#041322;background:linear-gradient(135deg,#67e8f9,#38bdf8)}.secondary{padding:10px 14px;color:#dff6ff;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.16)}.danger{background:transparent;color:#fb7185}.toolbar,.filters{display:flex;gap:12px;align-items:center;justify-content:space-between;margin-bottom:14px}.filters input{flex:1}.filters select{width:190px}.table-wrap{overflow:auto;border:1px solid #e2e8f0;border-radius:18px}table{width:100%;border-collapse:collapse;min-width:1040px}th,td{padding:12px 14px;border-bottom:1px solid #e2e8f0;text-align:left;vertical-align:top}th{background:#f1f7ff;color:#334155;font-size:.9rem}td small{display:block;margin-top:3px;color:#64748b;max-width:280px}.pill,.status{display:inline-flex;padding:6px 9px;border-radius:999px;font-size:.82rem;font-weight:900}.income{background:#dcfce7;color:#166534}.expense{background:#ffe4e6;color:#9f1239}.pending{background:#fef3c7;color:#92400e}.approved{background:#dcfce7;color:#166534}.rejected{background:#fee2e2;color:#991b1b}.actions{display:flex;gap:8px;align-items:center}.icon{width:32px;height:32px;border-radius:10px}.ok{background:#dcfce7;color:#166534}.no{background:#fee2e2;color:#991b1b}.empty{text-align:center;color:#64748b;padding:36px}.file-note{font-size:.86rem;color:#64748b;margin-top:6px}.evidence-link{font-weight:900;color:#0284c7;text-decoration:none}.report-actions{display:flex;justify-content:flex-end;gap:10px;margin-bottom:12px}.report-header{display:flex;justify-content:space-between;gap:16px;padding-bottom:16px;margin-bottom:16px;border-bottom:2px solid #e2e8f0}.report-summary{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:18px}.report-summary div{padding:14px;border-radius:18px;background:#f8fafc;border:1px solid #e2e8f0}.chart{padding:16px;border:1px solid #e2e8f0;border-radius:20px;margin-bottom:18px}.chart-row{display:grid;grid-template-columns:90px 1fr;gap:10px;align-items:center;margin:10px 0}.bars{display:grid;gap:5px}.bar{min-width:54px;padding:6px 8px;border-radius:999px;font-size:.78rem;white-space:nowrap;overflow:hidden}.bar.in{background:#bbf7d0;color:#052e16}.bar.ex{background:#fecdd3;color:#881337}.center{min-height:100vh;display:grid;place-items:center;color:#d9e7f7}.hidden{display:none}@media(max-width:980px){.topbar,.toolbar,.filters,.report-header{flex-direction:column;align-items:stretch}.stat-grid,.report-summary{grid-template-columns:repeat(2,minmax(0,1fr))}.content{grid-template-columns:1fr}.filters select{width:100%}}@media(max-width:560px){.app{padding:14px}.stat-grid,.report-summary{grid-template-columns:1fr}.panel{padding:16px;border-radius:22px}.nav{display:grid;width:100%}.chart-row{grid-template-columns:1fr}}@media print{body{background:#fff}.app{width:100%;padding:0}.no-print,.nav,.topbar,.alert,.success{display:none!important}.stat,.panel,.report-summary div,.chart{box-shadow:none;border:1px solid #cbd5e1;background:#fff;color:#0f172a}table{min-width:0;font-size:10px}th,td{padding:6px}.table-wrap{overflow:visible;border:1px solid #cbd5e1}}
  </style>
</head>
<body>
  <div id="root" class="center">กำลังเปิดระบบ...</div>
  <script>
    const state = {
      user:null,
      settings:null,
      rows:[],
      page:'dashboard',
      filter:'all',
      search:'',
      evidenceName:'',
      form:{type:'expense',category:'',amount:'',date:new Date().toISOString().slice(0,10),note:'',evidence:null},
      message:'',
      error:''
    };
    const root = document.getElementById('root');
    const money = v => new Intl.NumberFormat('th-TH',{style:'currency',currency:'THB',minimumFractionDigits:2}).format(Number(v||0));
    const esc = v => String(v ?? '').replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
    const dateText = v => v ? new Intl.DateTimeFormat('th-TH',{dateStyle:'medium'}).format(new Date(v)) : '-';

    function call(action,payload={}){
      state.error='';
      render();
      google.script.run
        .withSuccessHandler(res=>{
          if(!res.ok){state.error=res.message||'เกิดข้อผิดพลาด'; render(); return;}
          state.user=res.user;
          state.settings=res.settings;
          state.rows=res.rows||[];
          state.message= action==='bootstrap'?'': 'บันทึกสำเร็จ';
          if(!state.form.category) state.form.category=(state.settings.categories||[])[0]||'';
          render();
        })
        .withFailureHandler(err=>{state.error=err.message||String(err); render();})
        .api({action,payload});
    }

    function summary(){
      const approved=state.rows.filter(r=>r.status==='approved');
      const income=approved.filter(r=>r.type==='income').reduce((s,r)=>s+Number(r.amount||0),0);
      const expense=approved.filter(r=>r.type==='expense').reduce((s,r)=>s+Number(r.amount||0),0);
      return {income,expense,balance:income-expense,pending:state.rows.filter(r=>r.status==='pending').length,total:state.rows.length};
    }
    function filteredRows(){
      return state.rows.filter(r=>{
        const ok=state.filter==='all'||r.type===state.filter||r.status===state.filter;
        const text=`${r.category||''} ${r.note||''} ${r.createdByEmail||''} ${r.evidenceName||''}`.toLowerCase();
        return ok && text.includes(state.search.toLowerCase());
      });
    }
    function monthly(){
      const map={};
      state.rows.filter(r=>r.status==='approved').forEach(r=>{
        const d=new Date(r.date);
        const k=isNaN(d)?'ไม่ระบุ':`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
        map[k] ||= {month:k,income:0,expense:0};
        map[k][r.type==='income'?'income':'expense'] += Number(r.amount||0);
      });
      return Object.values(map).sort((a,b)=>a.month.localeCompare(b.month)).slice(-6);
    }

    function setPage(p){state.page=p;state.message='';render()}
    function setFilter(v){state.filter=v;render()}
    function setSearch(v){state.search=v;render()}
    function setForm(k,v){state.form[k]=v;render()}

    function readEvidence(input){
      const file = input.files && input.files[0];
      state.form.evidence = null;
      state.evidenceName = '';
      if(!file){render(); return;}
      if(file.size > 5 * 1024 * 1024){state.error='ไฟล์หลักฐานต้องไม่เกิน 5MB'; input.value=''; render(); return;}
      state.evidenceName = 'กำลังอ่านไฟล์...';
      render();
      const reader = new FileReader();
      reader.onload = () => {
        state.form.evidence = { name:file.name, type:file.type, size:file.size, dataUrl:reader.result };
        state.evidenceName = file.name;
        render();
      };
      reader.onerror = () => { state.error='อ่านไฟล์หลักฐานไม่สำเร็จ'; state.evidenceName=''; render(); };
      reader.readAsDataURL(file);
    }

    function createTx(e){
      e.preventDefault();
      call('createTransaction',state.form);
      state.form={type:'expense',category:(state.settings.categories||[])[0]||'',amount:'',date:new Date().toISOString().slice(0,10),note:'',evidence:null};
      state.evidenceName='';
    }
    function approve(id,status){ call('approveTransaction',{id,status}); }
    function delTx(id){ if(confirm('ลบรายการนี้? ไฟล์หลักฐานจะไม่ถูกลบอัตโนมัติ')) call('deleteTransaction',{id}); }
    function saveSettings(e){
      e.preventDefault();
      const fd=new FormData(e.target);
      call('saveSettings',{organizationName:fd.get('organizationName'),fiscalYear:fd.get('fiscalYear'),categories:String(fd.get('categoriesText')).split('\n').map(x=>x.trim()).filter(Boolean)});
    }
    function exportCsv(){
      const header=['date','type','category','amount','status','createdByEmail','note','evidenceName','evidenceUrl'];
      const lines=filteredRows().map(r=>header.map(k=>`"${String(r[k]||'').replaceAll('"','""')}"`).join(','));
      const blob=new Blob(['\ufeff'+[header.join(','),...lines].join('\n')],{type:'text/csv;charset=utf-8'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      a.href=url;
      a.download=`rtafnc-expense-${new Date().toISOString().slice(0,10)}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function txTable(rows){
      return `<div class="table-wrap"><table><thead><tr><th>วันที่</th><th>ประเภท</th><th>หมวดหมู่</th><th>จำนวน</th><th>หลักฐาน</th><th>สถานะ</th><th>ผู้บันทึก</th><th class="no-print">จัดการ</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${dateText(r.date)}</td><td><span class="pill ${r.type}">${r.type==='income'?'รายรับ':'รายจ่าย'}</span></td><td><b>${esc(r.category)}</b><small>${esc(r.note)}</small></td><td>${money(r.amount)}</td><td>${r.evidenceUrl?`<a class="evidence-link" href="${esc(r.evidenceUrl)}" target="_blank">เปิดหลักฐาน</a><small>${esc(r.evidenceName)}</small>`:'-'}</td><td><span class="status ${r.status}">${r.status==='approved'?'อนุมัติแล้ว':r.status==='rejected'?'ไม่อนุมัติ':'รออนุมัติ'}</span></td><td>${esc(r.createdByEmail)}</td><td class="no-print"><div class="actions">${state.user?.role==='admin'&&r.status==='pending'?`<button class="icon ok" onclick="approve('${r.id}','approved')">✓</button><button class="icon no" onclick="approve('${r.id}','rejected')">×</button>`:''}${state.user?.role==='admin'?`<button class="danger" onclick="delTx('${r.id}')">ลบ</button>`:''}</div></td></tr>`).join('')||`<tr><td colspan="8" class="empty">ยังไม่มีข้อมูล</td></tr>`}</tbody></table></div>`;
    }

    function render(){
      if(!state.user||!state.settings){
        root.className='center';
        root.innerHTML= state.error?`<div><h2>เปิดระบบไม่สำเร็จ</h2><div class="alert">${esc(state.error)}</div><button class="secondary" onclick="call('bootstrap')">ลองใหม่</button></div>`:'กำลังเปิดระบบ...';
        return;
      }
      root.className='app';
      const s=summary();
      const cats=state.settings.categories||[];
      const rows=filteredRows();
      root.innerHTML=`<header class="topbar no-print"><div><div class="eyebrow">${esc(state.settings.organizationName)}</div><h1>RTAFNC Expense Tracker</h1></div><div class="profile"><b>${esc(state.user.displayName||state.user.email)}</b><small>${esc(state.user.role)}</small></div></header><nav class="nav no-print"><button class="${state.page==='dashboard'?'active':''}" onclick="setPage('dashboard')">Dashboard</button><button class="${state.page==='report'?'active':''}" onclick="setPage('report')">รายงาน</button>${state.user.role==='admin'?`<button class="${state.page==='settings'?'active':''}" onclick="setPage('settings')">ตั้งค่า</button>`:''}</nav>${state.error?`<div class="alert no-print">${esc(state.error)}</div>`:''}${state.message?`<div class="success no-print">${esc(state.message)}</div>`:''}<section class="stat-grid"><article class="stat"><span>รายรับอนุมัติแล้ว</span><strong>${money(s.income)}</strong></article><article class="stat"><span>รายจ่ายอนุมัติแล้ว</span><strong>${money(s.expense)}</strong></article><article class="stat"><span>คงเหลือสุทธิ</span><strong>${money(s.balance)}</strong></article><article class="stat"><span>รออนุมัติ</span><strong>${s.pending} รายการ</strong></article></section>${state.page==='dashboard'?dashboard(cats,rows):state.page==='report'?report(rows,s):settingsPage(cats)}`;
    }

    function dashboard(cats,rows){
      return `<section class="content no-print"><form class="panel" onsubmit="createTx(event)"><h2>บันทึกรายการใหม่</h2><p class="muted">บันทึกลง Google Sheet โดยตรง ไม่ใช้ Firebase</p><label>ประเภท</label><div class="seg"><button type="button" class="${state.form.type==='expense'?'active':''}" onclick="setForm('type','expense')">รายจ่าย</button><button type="button" class="${state.form.type==='income'?'active':''}" onclick="setForm('type','income')">รายรับ</button></div><label>หมวดหมู่</label><select onchange="setForm('category',this.value)">${cats.map(c=>`<option ${state.form.category===c?'selected':''}>${esc(c)}</option>`).join('')}</select><label>จำนวนเงิน</label><input type="number" min="0" step="0.01" required value="${esc(state.form.amount)}" oninput="setForm('amount',this.value)"><label>วันที่</label><input type="date" required value="${esc(state.form.date)}" onchange="setForm('date',this.value)"><label>รายละเอียด</label><textarea rows="4" oninput="setForm('note',this.value)">${esc(state.form.note)}</textarea><label>แนบหลักฐาน</label><input type="file" accept="image/*,application/pdf" onchange="readEvidence(this)"><div class="file-note">รองรับรูปภาพ/PDF ไม่เกิน 5MB ${state.evidenceName?`<br>ไฟล์: <b>${esc(state.evidenceName)}</b>`:''}</div><button class="primary">บันทึกข้อมูล</button></form><section class="panel"><div class="toolbar"><div><h2>รายการล่าสุด</h2><p class="muted">ฐานข้อมูลคือ Google Sheet + หลักฐานอยู่ใน Google Drive</p></div><button class="secondary" onclick="exportCsv()">Export CSV</button></div><div class="filters"><input placeholder="ค้นหา" value="${esc(state.search)}" oninput="setSearch(this.value)"><select onchange="setFilter(this.value)"><option value="all">ทั้งหมด</option><option value="income">รายรับ</option><option value="expense">รายจ่าย</option><option value="pending">รออนุมัติ</option><option value="approved">อนุมัติแล้ว</option><option value="rejected">ไม่อนุมัติ</option></select></div>${txTable(rows)}</section></section>`;
    }

    function report(rows,s){
      const m=monthly();
      const max=Math.max(1,...m.flatMap(x=>[x.income,x.expense]));
      return `<section><div class="report-actions no-print"><button class="secondary" onclick="window.print()">พิมพ์ / Save PDF</button><button class="secondary" onclick="exportCsv()">Export CSV</button></div><article class="panel"><header class="report-header"><div><h2>รายงานสรุปรายรับรายจ่าย</h2><p>${esc(state.settings.organizationName)}</p></div><div><b>ปีงบประมาณ ${esc(state.settings.fiscalYear)}</b><br><span>พิมพ์เมื่อ ${dateText(new Date().toISOString())}</span></div></header><section class="report-summary"><div><span>รายรับ</span><strong>${money(s.income)}</strong></div><div><span>รายจ่าย</span><strong>${money(s.expense)}</strong></div><div><span>คงเหลือ</span><strong>${money(s.balance)}</strong></div><div><span>รายการทั้งหมด</span><strong>${s.total}</strong></div></section><section class="chart"><h3>ภาพรวม 6 เดือนล่าสุด</h3>${m.map(x=>`<div class="chart-row"><span>${x.month}</span><div class="bars"><div class="bar in" style="width:${Math.max(4,x.income/max*100)}%">${money(x.income)}</div><div class="bar ex" style="width:${Math.max(4,x.expense/max*100)}%">${money(x.expense)}</div></div></div>`).join('')||'<p>ยังไม่มีข้อมูลอนุมัติ</p>'}</section><h3>รายการตามตัวกรองปัจจุบัน</h3>${txTable(rows)}</article></section>`;
    }

    function settingsPage(cats){
      return `<section class="panel no-print" style="max-width:760px"><h2>ตั้งค่าระบบ</h2><p class="muted">เฉพาะ admin</p><form onsubmit="saveSettings(event)"><label>ชื่อองค์กร</label><input name="organizationName" value="${esc(state.settings.organizationName)}"><label>ปีงบประมาณ / ปีการศึกษา</label><input name="fiscalYear" value="${esc(state.settings.fiscalYear)}"><label>หมวดหมู่ รายการละ 1 บรรทัด</label><textarea name="categoriesText" rows="8">${esc(cats.join('\n'))}</textarea><button class="primary">บันทึกการตั้งค่า</button></form></section>`;
    }

    call('bootstrap');
  </script>
</body>
</html>
