name: Deploy RTAFNC LIFF Demo

on:
  push:
    branches: [main]
    paths:
      - 'apps/liff/**'
      - 'apps/admin/**'
      - 'supabase/functions/line-auth/**'
      - 'supabase/migrations/**'
      - 'docs/PRODUCTION_GAP_ANALYSIS.md'
      - 'tests/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate static application
        run: |
          set -euo pipefail
          node --check apps/liff/app-runtime.js
          node --check apps/liff/interaction-hotfix.js
          node --check apps/liff/config.js
          node --check apps/admin/app.js
          node --check apps/admin/interaction-hotfix.js
          node --check apps/admin/config.js
          node tests/static-contract.test.mjs
          test -s apps/liff/index.html
          test -s apps/liff/styles.css
          test -s apps/liff/extensions.css
          test -s apps/admin/index.html
          test -s apps/admin/styles.css

      - name: Prepare public demo artifact
        run: |
          set -euo pipefail
          rm -rf public
          mkdir -p public/admin-demo
          cp -R apps/liff/. public/
          cp -R apps/admin/. public/admin-demo/
          touch public/.nojekyll
          cp public/index.html public/404.html
          printf '{"application":"RTAFNC Student LIFF","mode":"demo","commit":"%s","deployed_at":"%s"}\n' \
            "$GITHUB_SHA" "$(date -u +'%Y-%m-%dT%H:%M:%SZ')" > public/health.json
          test -s public/index.html
          test -s public/app-runtime.js
          test -s public/extensions.css
          test -s public/config.js
          test -s public/admin-demo/index.html
          test -s public/admin-demo/interaction-hotfix.js

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
