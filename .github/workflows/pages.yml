name: Enable and Deploy RTAFNC Pages

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - '.nojekyll'
      - 'apps/liff/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable GitHub Pages
        id: enable_pages
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          status=$(curl -sS -o /tmp/pages.json -w '%{http_code}' \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GH_REPO}/pages")

          if [ "$status" = "404" ]; then
            create_status=$(curl -sS -o /tmp/pages-create.json -w '%{http_code}' \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GH_REPO}/pages" \
              -d '{"build_type":"workflow"}')
            cat /tmp/pages-create.json || true
            if [ "$create_status" != "201" ] && [ "$create_status" != "409" ]; then
              echo "Unable to create Pages site. HTTP $create_status"
              exit 1
            fi
          elif [ "$status" = "200" ]; then
            cat /tmp/pages.json || true
            update_status=$(curl -sS -o /tmp/pages-update.json -w '%{http_code}' \
              -X PUT \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GH_REPO}/pages" \
              -d '{"build_type":"workflow"}')
            cat /tmp/pages-update.json || true
            if [ "$update_status" != "204" ] && [ "$update_status" != "200" ]; then
              echo "Unable to switch Pages to workflow mode. HTTP $update_status"
              exit 1
            fi
          else
            cat /tmp/pages.json || true
            echo "Unexpected Pages status: HTTP $status"
            exit 1
          fi

      - name: Prepare public Student LIFF site
        run: |
          rm -rf public
          mkdir -p public
          cp -R apps/liff/. public/
          touch public/.nojekyll
          cp public/index.html public/404.html
          test -s public/index.html
          test -s public/styles.css
          test -s public/app-runtime.js
          test -s public/config.js

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify published site
        id: verify
        env:
          SITE_URL: https://anuchit1tube168-cmd.github.io/RTAFNC-/
        run: |
          set -e
          for attempt in $(seq 1 18); do
            code=$(curl -L -sS -o /tmp/site.html -w '%{http_code}' "${SITE_URL}?check=${GITHUB_RUN_ID}" || true)
            if [ "$code" = "200" ] && grep -q 'RTAFNC Student Portal' /tmp/site.html; then
              echo "site_status=online" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Attempt ${attempt}: HTTP ${code}"
            sleep 10
          done
          echo "site_status=verification_failed" >> "$GITHUB_OUTPUT"
          exit 1

      - name: Write deployment result
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          JOB_STATUS: ${{ job.status }}
          DEPLOY_URL: ${{ steps.deployment.outputs.page_url }}
          VERIFY_STATUS: ${{ steps.verify.outputs.site_status }}
        run: |
          set -e
          timestamp=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          payload=$(printf '{"status":"%s","verify":"%s","run_id":"%s","attempt":"%s","url":"%s","updated_at":"%s"}\n' \
            "$JOB_STATUS" "${VERIFY_STATUS:-not_run}" "$RUN_ID" "$RUN_ATTEMPT" "${DEPLOY_URL:-https://anuchit1tube168-cmd.github.io/RTAFNC-/}" "$timestamp")
          encoded=$(printf '%s' "$payload" | base64 -w 0)
          existing=$(curl -sS \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GH_REPO}/contents/deployment/pages-result.json")
          sha=$(printf '%s' "$existing" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("sha", ""))' 2>/dev/null || true)
          if [ -n "$sha" ]; then
            body=$(python3 -c 'import json,sys; print(json.dumps({"message":"Update Pages deployment result","content":sys.argv[1],"sha":sys.argv[2]}))' "$encoded" "$sha")
          else
            body=$(python3 -c 'import json,sys; print(json.dumps({"message":"Record Pages deployment result","content":sys.argv[1]}))' "$encoded")
          fi
          curl -sS -X PUT \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GH_REPO}/contents/deployment/pages-result.json" \
            -d "$body" >/tmp/result-write.json
          cat /tmp/result-write.json
