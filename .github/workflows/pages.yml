name: Enable and Deploy RTAFNC Pages

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - '.nojekyll'
      - 'apps/liff/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable GitHub Pages for workflow deployment
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -e
          status=$(curl -sS -o /tmp/pages.json -w '%{http_code}' \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GH_REPO}/pages")

          if [ "$status" = "404" ]; then
            create_status=$(curl -sS -o /tmp/pages-create.json -w '%{http_code}' \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GH_REPO}/pages" \
              -d '{"build_type":"workflow"}')
            cat /tmp/pages-create.json || true
            test "$create_status" = "201" || test "$create_status" = "409"
          else
            cat /tmp/pages.json || true
            test "$status" = "200"
            curl -sS -X PUT \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GH_REPO}/pages" \
              -d '{"build_type":"workflow"}' >/tmp/pages-update.json || true
            cat /tmp/pages-update.json || true
          fi

      - name: Prepare public Student LIFF site
        run: |
          rm -rf public
          mkdir -p public
          cp -R apps/liff/. public/
          touch public/.nojekyll
          cp public/index.html public/404.html
          test -s public/index.html
          test -s public/styles.css
          test -s public/app-runtime.js
          test -s public/config.js

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
