name: Deploy AGIS Command Center v3

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'agis-agent-armada-os/apps/command-center-v3/**'
      - '.github/workflows/agis-crew-dashboard-pages.yml'
  push:
    branches:
      - main
    paths:
      - 'agis-agent-armada-os/apps/command-center-v3/**'
      - '.github/workflows/agis-crew-dashboard-pages.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: agis-command-center-v3-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false
      - name: Extract application JavaScript
        run: |
          python - <<'PY'
          from pathlib import Path
          import re, sys
          root = Path('agis-agent-armada-os/apps/command-center-v3')
          files = {
            'index': root / 'index.html',
            'processor': root / 'processor-console.html',
            'captain': root / 'captain-console.html',
            'client': root / 'processor-client.js',
            'loop': root / 'loop-engine.json',
            'crew': root / 'crew-operations.json'
          }
          html = files['index'].read_text(encoding='utf-8') if files['index'].exists() else ''
          processor_html = files['processor'].read_text(encoding='utf-8') if files['processor'].exists() else ''
          captain_html = files['captain'].read_text(encoding='utf-8') if files['captain'].exists() else ''
          required = ['Mission Queue','Evaluation 40D','Output Center','PROCESSOR_URL','No evidence = Not Done']
          missing = [item for item in required if item not in html]
          captain_required = ['AGIS Captain Console','Loop Engineering v1.0','AGIS รับงานและเริ่ม Loop','No Evidence = Not Done']
          captain_missing = [item for item in captain_required if item not in captain_html]
          scripts = re.findall(r'<script>(.*?)</script>', html, re.S)
          processor_scripts = re.findall(r'<script>(.*?)</script>', processor_html, re.S)
          captain_scripts = re.findall(r'<script>(.*?)</script>', captain_html, re.S)
          Path('/tmp/agis-app.js').write_text('\n'.join(scripts), encoding='utf-8')
          Path('/tmp/agis-console.js').write_text('\n'.join(processor_scripts), encoding='utf-8')
          Path('/tmp/agis-captain.js').write_text('\n'.join(captain_scripts), encoding='utf-8')
          messages = [f'{k}_exists={v.exists()}' for k,v in files.items()]
          messages += [f'missing_contracts={missing}', f'captain_missing={captain_missing}']
          Path('/tmp/extract.log').write_text('\n'.join(messages), encoding='utf-8')
          print('\n'.join(messages))
          if missing or captain_missing or not scripts or not processor_scripts or not captain_scripts or not all(v.exists() for v in files.values()):
              sys.exit(1)
          PY
      - name: Check JavaScript syntax
        run: |
          node --check /tmp/agis-app.js
          node --check /tmp/agis-console.js
          node --check /tmp/agis-captain.js
          node --check agis-agent-armada-os/apps/command-center-v3/processor-client.js
          echo 'JavaScript syntax PASS' | tee /tmp/node-check.log
      - name: Validate JSON manifests and Loop Engine
        run: |
          python -m json.tool agis-agent-armada-os/apps/command-center-v3/manifest.webmanifest > /dev/null
          python -m json.tool agis-agent-armada-os/apps/command-center-v3/release.json > /dev/null
          python -m json.tool agis-agent-armada-os/apps/command-center-v3/loop-engine.json > /dev/null
          python -m json.tool agis-agent-armada-os/apps/command-center-v3/crew-operations.json > /dev/null
      - name: Upload validation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agis-command-center-v3-validation
          if-no-files-found: warn
          path: |
            /tmp/agis-app.js
            /tmp/agis-console.js
            /tmp/agis-captain.js
            /tmp/extract.log
            /tmp/node-check.log

  deploy:
    if: github.event_name != 'pull_request'
    needs: validate
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload AGIS Command Center v3
        uses: actions/upload-pages-artifact@v3
        with:
          path: agis-agent-armada-os/apps/command-center-v3
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
