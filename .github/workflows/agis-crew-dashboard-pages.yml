name: Deploy AGIS Command Center v3

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'agis-agent-armada-os/apps/command-center-v3/**'
      - '.github/workflows/agis-crew-dashboard-pages.yml'
  push:
    branches:
      - main
    paths:
      - 'agis-agent-armada-os/apps/command-center-v3/**'
      - '.github/workflows/agis-crew-dashboard-pages.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: agis-command-center-v3-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Extract inline application JavaScript
        run: |
          test -f agis-agent-armada-os/apps/command-center-v3/index.html
          test -f agis-agent-armada-os/apps/command-center-v3/manifest.webmanifest
          python - <<'PY'
          from pathlib import Path
          import re
          html = Path('agis-agent-armada-os/apps/command-center-v3/index.html').read_text(encoding='utf-8')
          required = ['Mission Queue','Evaluation 40D','Output Center','PROCESSOR_URL','No Evidence = Not Done']
          missing = [item for item in required if item not in html]
          if missing:
              raise SystemExit(f'Missing required UI contracts: {missing}')
          scripts = re.findall(r'<script>(.*?)</script>', html, re.S)
          if not scripts:
              raise SystemExit('No inline application script found')
          Path('/tmp/agis-app.js').write_text('\n'.join(scripts), encoding='utf-8')
          print('HTML contract PASS; extracted inline JavaScript')
          PY
      - name: Check JavaScript syntax
        run: |
          node --check /tmp/agis-app.js > /tmp/node-check.log 2>&1 || { cat /tmp/node-check.log; exit 1; }
          cat /tmp/node-check.log
      - name: Validate PWA manifest
        run: python -m json.tool agis-agent-armada-os/apps/command-center-v3/manifest.webmanifest > /dev/null
      - name: Upload validation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agis-command-center-v3-validation
          path: |
            /tmp/agis-app.js
            /tmp/node-check.log

  deploy:
    if: github.event_name != 'pull_request'
    needs: validate
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload AGIS Command Center v3
        uses: actions/upload-pages-artifact@v3
        with:
          path: agis-agent-armada-os/apps/command-center-v3
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
