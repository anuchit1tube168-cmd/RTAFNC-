name: Deploy AGIS Command Center v3

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'agis-agent-armada-os/apps/command-center-v3/**'
      - '.github/workflows/agis-crew-dashboard-pages.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: agis-command-center-v3-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload AGIS Command Center v3
        uses: actions/upload-pages-artifact@v3
        with:
          path: agis-agent-armada-os/apps/command-center-v3
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
