name: Deploy AGIS Command Center v3

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'agis-agent-armada-os/apps/command-center-v3/**'
      - '.github/workflows/agis-crew-dashboard-pages.yml'
  push:
    branches:
      - main
    paths:
      - 'agis-agent-armada-os/apps/command-center-v3/**'
      - '.github/workflows/agis-crew-dashboard-pages.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: agis-command-center-v3-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false
      - name: Extract application JavaScript
        run: |
          python - <<'PY'
          from pathlib import Path
          import re, sys
          root = Path('agis-agent-armada-os/apps/command-center-v3')
          index = root / 'index.html'
          console = root / 'processor-console.html'
          client = root / 'processor-client.js'
          messages = []
          html = index.read_text(encoding='utf-8') if index.exists() else ''
          console_html = console.read_text(encoding='utf-8') if console.exists() else ''
          required = ['Mission Queue','Evaluation 40D','Output Center','PROCESSOR_URL','No evidence = Not Done']
          missing = [item for item in required if item not in html]
          scripts = re.findall(r'<script>(.*?)</script>', html, re.S)
          console_scripts = re.findall(r'<script>(.*?)</script>', console_html, re.S)
          Path('/tmp/agis-app.js').write_text('\n'.join(scripts), encoding='utf-8')
          Path('/tmp/agis-console.js').write_text('\n'.join(console_scripts), encoding='utf-8')
          messages.append(f'index_exists={index.exists()}')
          messages.append(f'console_exists={console.exists()}')
          messages.append(f'client_exists={client.exists()}')
          messages.append(f'html_chars={len(html)}')
          messages.append(f'script_blocks={len(scripts)}')
          messages.append(f'console_script_blocks={len(console_scripts)}')
          messages.append(f'missing_contracts={missing}')
          Path('/tmp/extract.log').write_text('\n'.join(messages), encoding='utf-8')
          print('\n'.join(messages))
          if missing or not scripts or not console_scripts or not client.exists():
              sys.exit(1)
          PY
      - name: Check JavaScript syntax
        run: |
          node --check /tmp/agis-app.js
          node --check /tmp/agis-console.js
          node --check agis-agent-armada-os/apps/command-center-v3/processor-client.js
          echo 'JavaScript syntax PASS' | tee /tmp/node-check.log
      - name: Validate JSON manifests
        run: |
          python -m json.tool agis-agent-armada-os/apps/command-center-v3/manifest.webmanifest > /dev/null
          python -m json.tool agis-agent-armada-os/apps/command-center-v3/release.json > /dev/null
      - name: Upload validation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agis-command-center-v3-validation
          if-no-files-found: warn
          path: |
            /tmp/agis-app.js
            /tmp/agis-console.js
            /tmp/extract.log
            /tmp/node-check.log

  deploy:
    if: github.event_name != 'pull_request'
    needs: validate
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload AGIS Command Center v3
        uses: actions/upload-pages-artifact@v3
        with:
          path: agis-agent-armada-os/apps/command-center-v3
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
