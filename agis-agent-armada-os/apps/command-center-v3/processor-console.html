<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AGIS Processor Console</title>
<style>
:root{--bg:#07111f;--panel:#0d1d31;--line:#28445f;--gold:#efc66f;--text:#eef6ff;--muted:#91a8c4;--ok:#4ade80;--bad:#fb7185;--blue:#38bdf8}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 0 0,#163853,transparent 35%),var(--bg);color:var(--text);font-family:system-ui,"Noto Sans Thai",sans-serif}.wrap{max-width:1180px;margin:auto;padding:20px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:16px}.top h1{margin:0;color:var(--gold)}.top p{margin:5px 0;color:var(--muted)}.status{padding:8px 12px;border-radius:999px;border:1px solid var(--line);color:var(--muted)}.status.ok{color:var(--ok);border-color:#4ade8055}.status.bad{color:var(--bad);border-color:#fb718555}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.panel{background:#0d1d31e8;border:1px solid var(--line);border-radius:16px;padding:16px}.panel h2{margin-top:0}.full{grid-column:1/-1}label{display:grid;gap:6px;color:#d8e5f3;margin:9px 0}input,textarea,select{width:100%;background:#061426;color:var(--text);border:1px solid #426687;border-radius:10px;padding:10px}textarea{min-height:100px}button{border:0;border-radius:10px;padding:10px 13px;font:inherit;cursor:pointer;background:#ffffff10;color:var(--text);border:1px solid #ffffff24}.primary{background:linear-gradient(135deg,var(--gold),#aa7627);color:#07111f;font-weight:800}.actions{display:flex;gap:8px;flex-wrap:wrap}.log{white-space:pre-wrap;background:#03101d;border:1px solid var(--line);padding:12px;border-radius:12px;min-height:180px;max-height:420px;overflow:auto;font:12px ui-monospace,monospace}.cards{display:grid;gap:8px}.card{border:1px solid var(--line);border-radius:12px;padding:10px;background:#ffffff08}.card b{color:var(--gold)}.small{font-size:12px;color:var(--muted)}@media(max-width:800px){.grid{grid-template-columns:1fr}.full{grid-column:auto}.top{align-items:flex-start;flex-direction:column}}
</style>
</head>
<body><div class="wrap">
<div class="top"><div><h1>AGIS Processor Console</h1><p>รับคำสั่ง → สร้างงาน → Route Mission → Evidence → Receipt → Dashboard</p></div><div id="status" class="status">ยังไม่ตรวจการเชื่อมต่อ</div></div>
<div class="grid">
<section class="panel"><h2>1. เชื่อมระบบ</h2><p class="small" id="url"></p><div class="actions"><button id="health">Health Check</button><button id="setup">Setup</button><button id="refresh" class="primary">Refresh Dashboard</button></div></section>
<section class="panel"><h2>2. สร้างงานใหม่</h2><form id="jobForm"><label>คำสั่งจาก Boss<textarea id="bossCommand" required placeholder="เช่น สร้างรายงาน OBE ฉบับสมบูรณ์"></textarea></label><label>เป้าหมายเดียวที่ต้องได้<textarea id="onePiece" required placeholder="เช่น ได้ไฟล์รายงานพร้อมหลักฐานและข้อเสนอแนะ"></textarea></label><label>Priority<select id="priority"><option>High</option><option selected>Medium</option><option>Low</option></select></label><div class="actions"><button class="primary">Create Job + Route</button></div></form></section>
<section class="panel"><h2>3. อัปเดต Mission</h2><form id="missionForm"><label>Mission ID<input id="missionId" required></label><label>Status<select id="missionStatus"><option>Working</option><option>Review</option><option>Done</option></select></label><label>Evidence URL<input id="evidenceUrl" placeholder="https://..."></label><button class="primary">Update Mission</button></form></section>
<section class="panel"><h2>4. สร้าง Receipt</h2><form id="receiptForm"><label>Job ID<input id="receiptJobId"></label><label>Mission ID<input id="receiptMissionId"></label><label>Evidence URL<input id="receiptEvidence" required></label><label>Test Result<select id="testResult"><option>Pass</option><option>Pending</option><option>Fail</option></select></label><label>สรุปภาษาไทย<textarea id="summaryTH"></textarea></label><button class="primary">Create Receipt</button></form></section>
<section class="panel full"><h2>Dashboard State</h2><div id="kpi" class="cards"></div><h3>งานล่าสุด</h3><div id="jobs" class="cards"></div><h3>ภารกิจล่าสุด</h3><div id="missions" class="cards"></div></section>
<section class="panel full"><h2>System Log</h2><div id="log" class="log"></div></section>
</div></div>
<script src="processor-client.js"></script>
<script>
const $=s=>document.querySelector(s),log=(label,data)=>{$('#log').textContent=`${new Date().toLocaleString('th-TH')}  ${label}\n${JSON.stringify(data,null,2)}\n\n`+$('#log').textContent};
$('#url').textContent=window.AGISSProcessor.url;
function setStatus(ok,text){let e=$('#status');e.className='status '+(ok?'ok':'bad');e.textContent=text}
async function call(label,fn){try{const d=await fn();log(label,d);setStatus(!!d.ok,d.ok?'เชื่อมต่อสำเร็จ':'ระบบตอบกลับแต่มีข้อผิดพลาด');return d}catch(e){log(label,{ok:false,error:e.message});setStatus(false,'เชื่อมต่อไม่สำเร็จ');throw e}}
$('#health').onclick=()=>call('health',()=>AGISSProcessor.health());
$('#setup').onclick=()=>call('setup',()=>AGISSProcessor.call('setup'));
$('#refresh').onclick=()=>refresh();
async function refresh(){const d=await call('dashboard.state',()=>AGISSProcessor.call('dashboard.state'));if(!d||!d.ok)return;$('#kpi').innerHTML=Object.entries(d.kpi||{}).map(([k,v])=>`<div class="card"><b>${k}</b><div>${v}</div></div>`).join('');$('#jobs').innerHTML=(d.jobs||[]).slice().reverse().map(j=>`<div class="card"><b>${j.jobId||''}</b><div>${j.bossCommand||''}</div><div class="small">${j.status||''} · ${j.ownerAgent||''}</div></div>`).join('');$('#missions').innerHTML=(d.missions||[]).slice().reverse().map(m=>`<div class="card"><b>${m.missionId||''}</b><div>${m.title||''}</div><div class="small">${m.status||''} · ${m.ownerAgent||''}</div></div>`).join('')}
$('#jobForm').onsubmit=async e=>{e.preventDefault();const created=await call('job.create',()=>AGISSProcessor.call('job.create',{bossCommand:$('#bossCommand').value.trim(),onePiece:$('#onePiece').value.trim(),priority:$('#priority').value}));if(created&&created.ok){await call('job.route',()=>AGISSProcessor.call('job.route',{jobId:created.jobId}));$('#receiptJobId').value=created.jobId;await refresh()}};
$('#missionForm').onsubmit=async e=>{e.preventDefault();await call('mission.update',()=>AGISSProcessor.call('mission.update',{missionId:$('#missionId').value.trim(),status:$('#missionStatus').value,evidenceUrl:$('#evidenceUrl').value.trim()}));await refresh()};
$('#receiptForm').onsubmit=async e=>{e.preventDefault();await call('receipt.create',()=>AGISSProcessor.call('receipt.create',{jobId:$('#receiptJobId').value.trim(),missionId:$('#receiptMissionId').value.trim(),evidence:$('#receiptEvidence').value.trim(),testResult:$('#testResult').value,summaryTH:$('#summaryTH').value.trim()}));await refresh()};
setTimeout(()=>$('#health').click(),300);
</script></body></html>
